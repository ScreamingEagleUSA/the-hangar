<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Color Match</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1d27;color:#e8eaed;font-family:system-ui,-apple-system,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;user-select:none}
h1{font-size:2rem;margin-bottom:8px}
.info{color:#9ca3af;margin-bottom:20px;font-size:.9rem;text-align:center;max-width:320px}
.hud{display:flex;gap:30px;margin-bottom:20px;font-size:1.2rem;font-weight:700}
.hud span{color:#fbbf24}
.prompt{font-size:3rem;font-weight:900;margin-bottom:24px;letter-spacing:2px;text-transform:uppercase;transition:color .1s}
.choices{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:24px}
.choice-btn{width:90px;height:90px;border-radius:16px;border:3px solid #3a3d47;cursor:pointer;transition:transform .1s,border-color .1s}
.choice-btn:hover{transform:scale(1.1);border-color:#fff}
.feedback{font-size:1.2rem;font-weight:700;min-height:30px;margin-bottom:16px}
.feedback.correct{color:#4ade80}
.feedback.wrong{color:#f87171}
button.play{background:#5b7fff;color:#fff;border:none;padding:14px 40px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}
button.play:hover{background:#4a6ee6}
.end-screen{text-align:center;display:none}
.end-screen .final{font-size:3rem;color:#4ade80;font-weight:800;margin:12px 0}
.game-area{display:none;flex-direction:column;align-items:center}
</style>
</head>
<body>
<div id="startScreen" style="text-align:center">
  <h1>🎨 Color Match</h1>
  <p class="info">The word says one color but is displayed in another. Tap the color the word is DISPLAYED in, not what it says!</p>
  <button class="play" onclick="startGame()">Play</button>
</div>
<div id="gameArea" class="game-area">
  <div class="hud">
    <div>Score: <span id="score">0</span></div>
    <div>Time: <span id="timer">30</span>s</div>
    <div>Streak: <span id="streak">0</span></div>
  </div>
  <div class="prompt" id="prompt">RED</div>
  <div id="feedback" class="feedback"></div>
  <div class="choices" id="choices"></div>
</div>
<div id="endScreen" class="end-screen">
  <h1>Time's Up!</h1>
  <div class="final" id="finalScore">0</div>
  <p style="color:#9ca3af;margin-bottom:20px">points scored</p>
  <button class="play" onclick="startGame()">Play Again</button>
</div>
<script>
const GAME_ID='colorMatch';
const COLORS=[{name:'RED',hex:'#ef4444'},{name:'BLUE',hex:'#3b82f6'},{name:'GREEN',hex:'#22c55e'},{name:'YELLOW',hex:'#eab308'},{name:'PURPLE',hex:'#a855f7'},{name:'ORANGE',hex:'#f97316'}];
let score=0,timeLeft=30,streak=0,interval=null,correctIdx=-1;
const scoreEl=document.getElementById('score'),timerEl=document.getElementById('timer'),streakEl=document.getElementById('streak'),promptEl=document.getElementById('prompt'),feedbackEl=document.getElementById('feedback'),choicesEl=document.getElementById('choices');
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function newRound(){
  const textColor=COLORS[Math.floor(Math.random()*COLORS.length)];
  let displayColor;do{displayColor=COLORS[Math.floor(Math.random()*COLORS.length)]}while(displayColor===textColor);
  promptEl.textContent=textColor.name;promptEl.style.color=displayColor.hex;
  let opts=shuffle([...COLORS]).slice(0,4);
  if(!opts.find(c=>c.hex===displayColor.hex)){opts[Math.floor(Math.random()*4)]=displayColor}
  opts=shuffle(opts);correctIdx=opts.findIndex(c=>c.hex===displayColor.hex);
  choicesEl.innerHTML='';
  opts.forEach((c,i)=>{const b=document.createElement('div');b.className='choice-btn';b.style.background=c.hex;b.addEventListener('click',()=>pick(i));choicesEl.appendChild(b)})
}
function pick(i){
  if(i===correctIdx){score+=1+Math.floor(streak/3);streak++;feedbackEl.textContent='✓ Correct! +'+(1+Math.floor((streak-1)/3));feedbackEl.className='feedback correct'}
  else{streak=0;feedbackEl.textContent='✗ Wrong!';feedbackEl.className='feedback wrong'}
  scoreEl.textContent=score;streakEl.textContent=streak;setTimeout(()=>{feedbackEl.textContent='';newRound()},400)
}
function startGame(){score=0;timeLeft=30;streak=0;scoreEl.textContent='0';timerEl.textContent='30';streakEl.textContent='0';feedbackEl.textContent='';
  document.getElementById('startScreen').style.display='none';document.getElementById('endScreen').style.display='none';
  document.getElementById('gameArea').style.display='flex';newRound();
  interval=setInterval(()=>{timeLeft--;timerEl.textContent=timeLeft;if(timeLeft<=0){clearInterval(interval);
    document.getElementById('gameArea').style.display='none';document.getElementById('endScreen').style.display='block';document.getElementById('finalScore').textContent=score;
    try{parent.postMessage({type:'arcade-score',game:GAME_ID,score:score},'*')}catch(e){}}},1000)
}
</script>
</body>
</html>
